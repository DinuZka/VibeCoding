<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-light: #ffffff;
            --accent-color: #ffdada;
            --card-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Decorative Background Blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
            filter: blur(50px);
        }
        body::before { top: -100px; left: -100px; background: #ff0080; }
        body::after { bottom: -100px; right: -100px; background: #7928ca; }

        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            width: 340px;
            padding: 50px 30px;
            text-align: center;
            transition: all 0.5s ease;
            z-index: 1;
            color: var(--text-light);
        }

        .profile-card:hover {
            transform: translateY(-15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        .image-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #ffffff, rgba(255,255,255,0.2));
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .image-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            font-size: 2.5rem;
            color: white;
            backdrop-filter: blur(5px);
        }

        .student-name {
            margin: 10px 0 5px;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .student-stream {
            font-weight: 400;
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 3px;
            margin-bottom: 25px;
            display: block;
            opacity: 0.9;
        }

        .divider {
            height: 1px;
            width: 80%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            margin: 25px auto;
        }

        .student-bio {
            line-height: 1.8;
            font-size: 0.9rem;
            margin: 0;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="image-container">
            <!-- Placeholder for Profile Image -->
            <div class="image-placeholder">
                👤
            </div>
        </div>
        
        <h2 class="student-name">Alex Johnson</h2>
        <span class="student-stream">Computer Science & Engineering</span>
        
        <div class="divider"></div>
        
        <p class="student-bio">
            Passionate about building scalable web applications and exploring the intersection of AI and user experience. Lifelong learner and open-source enthusiast.
        </p>
    </div>

</body>
</html>
